<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan PB KJL ZON 3</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.glass{
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(10px);
}

.blink-red{
    animation:blink 4s infinite;
}

@keyframes blink{
    0%,50%,100%{opacity:1;}
    25%,75%{opacity:0;}
}
</style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen p-4">
<div class="max-w-md mx-auto space-y-6">
<div class="text-center text-white pt-4">
    <h2 class="text-2xl font-bold">FORMAT LAPORAN PENUGASAN KJL ZON 3</h2>
    <p class="text-xs italic blink-red">By NAZMI 👮🏿‍♂️🤣</p>
</div>

<div class="glass p-5 rounded-3xl shadow-2xl space-y-4">

    <!-- STESEN DROPDOWN -->
    <div class="space-y-1">
        <label for="stesen" class="text-xs font-semibold text-gray-500 px-1">Pilih Stesen Hari Ini</label>
        <select id="stesen" class="w-full p-3 rounded-xl border border-gray-300 bg-white text-gray-700">
            <option value="">-- SILA PILIH STESEN --</option>
            <option value="ABDULLAH HUKUM">ABDULLAH HUKUM</option>
            <option value="KERINCHI">KERINCHI</option>
            <option value="UNIVERSITI">UNIVERSITI</option>
            <option value="TAMAN JAYA">TAMAN JAYA</option>
            <option value="ASIA JAYA">ASIA JAYA</option>
            <option value="TAMAN PARAMOUNT">TAMAN PARAMOUNT</option>
            <option value="TAMAN BAHAGIA">TAMAN BAHAGIA</option>
            <option value="KELANA JAYA">KELANA JAYA</option>
        </select>
    </div>

    <!-- ANGGOTA -->
    <input
        type="text"
        id="anggota"
        placeholder="Nama Anggota"
        class="w-full p-3 rounded-xl border border-gray-300">

    <!-- LAPORAN BIASA -->
    <button
        id="sendLaporanBiasa"
        class="w-full bg-green-600 text-white p-3 rounded-xl font-bold hover:bg-green-700">
        Laporan Biasa
    </button>

    <hr>

    <!-- PEAK HOUR -->
    <textarea
        id="komenPeak"
        placeholder="Status Peak Hour / Krisis"
        class="w-full p-3 rounded-xl border border-gray-300 h-20"></textarea>

    <div class="grid grid-cols-2 gap-2">

        <button
            id="sendLaporanPeak"
            class="bg-amber-500 text-white p-3 rounded-xl font-bold text-sm hover:bg-amber-600">
            Laporan Peak Hour
        </button>

        <button
            id="sendLaporanTamat"
            class="bg-indigo-600 text-white p-3 rounded-xl font-bold text-sm hover:bg-indigo-700">
            Tamat Operasi
        </button>

    </div>

    <hr>

    <!-- KONTRAKTOR CUCIAN -->
    <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100 space-y-2">

        <p class="text-xs font-bold text-blue-800 uppercase">
            Kontraktor Cucian
        </p>

        <div class="grid grid-cols-2 gap-2">

            <input
                type="text"
                id="syarikatCucian"
                placeholder="Nama Syarikat"
                class="p-2 rounded-lg border border-gray-300 text-sm">

            <input
                type="number"
                id="jumlahCucian"
                placeholder="Jumlah Orang"
                class="p-2 rounded-lg border border-gray-300 text-sm">

        </div>

        <button
            id="sendLaporanCucian"
            class="w-full bg-cyan-600 text-white p-3 rounded-xl font-bold hover:bg-cyan-700">
            Laporan Kontraktor Cucian
        </button>

    </div>

    <!-- KONTRAKTOR AM -->
    <div class="bg-orange-50 p-3 rounded-2xl border border-orange-100 space-y-2">

        <p class="text-xs font-bold text-orange-800 uppercase">
            Kontraktor Am
        </p>

        <div class="grid grid-cols-2 gap-2">
            <input
                type="number"
                id="jumlahKontraktor"
                placeholder="Jumlah Kontraktor"
                class="p-2 rounded-lg border border-gray-300 text-sm">

            <input
                type="text"
                id="syarikatKontraktor"
                placeholder="Nama Syarikat"
                class="p-2 rounded-lg border border-gray-300 text-sm">
        </div>

        <input
            type="text"
            id="kerjaKontraktor"
            placeholder="Jenis Kerja Kontraktor (cth: baik pulih lampu)"
            class="w-full p-2 rounded-lg border border-gray-300 text-sm">

        <select id="jenisPas" class="w-full p-2 rounded-lg border border-gray-300 bg-white text-sm text-gray-700">
            <option value="Mempunyai Pas Kontraktor">Mempunyai Pas Kontraktor</option>
            <option value="Diberikan pas kontraktor sementara sehingga kerja-kerja baik pulih siap sepenuhnya">Diberikan Pas Kontraktor Sementara</option>
        </select>

        <input
            type="text"
            id="stafPemantau"
            placeholder="Staf Pemantau"
            class="w-full p-2 rounded-lg border border-gray-300 text-sm">

        <button
            id="sendLaporanKontraktor"
            class="w-full bg-orange-600 text-white p-3 rounded-xl font-bold hover:bg-orange-700">
            Laporan Kontraktor Am
        </button>

    </div>

    <!-- RESET -->
    <button
        id="resetStorage"
        class="w-full text-xs text-red-500 py-2 pt-4">
        Reset Semua Data 🚮
    </button>

</div>

</div>

<script>

const fields = [
'stesen',
'anggota',
'komenPeak',
'syarikatCucian',
'jumlahCucian',
'jumlahKontraktor',
'syarikatKontraktor',
'kerjaKontraktor',
'jenisPas',
'stafPemantau'
];

fields.forEach(id=>{
    document.getElementById(id).value =
    localStorage.getItem(id) || (id === 'jenisPas' ? 'Mempunyai Pas Kontraktor' : '');
});

fields.forEach(id=>{
    document.getElementById(id).addEventListener('change',e=>{
        localStorage.setItem(id,e.target.value);
    });
    document.getElementById(id).addEventListener('input',e=>{
        localStorage.setItem(id,e.target.value);
    });
});

function getTarikh(){
    return new Date().toLocaleDateString('ms-MY');
}

function getMasa(){

    const now = new Date();

    return now.toLocaleTimeString(
        'en-GB',
        {
            hour:'2-digit',
            minute:'2-digit',
            hour12:false
        }
    ).replace(':','') + 'HRS';
}

function hantar(teks){

    window.open(
        "https://api.whatsapp.com/send?text=" +
        encodeURIComponent(teks),
        "_blank"
    );
}

document.getElementById('sendLaporanBiasa').onclick = ()=>{

const stesen =
document.getElementById('stesen').value.toUpperCase();

hantar(`*Assalamualaikum wbt & Salam Sejahtera YDH Tuan,*

Laporan penugasan anggota bertugas Aliran Kelana Jaya Jabatan Sekuriti.

TARIKH : ${getTarikh()}
MASA : ${getMasa()}
TUGASAN : KAWALAN DAN PEMANTAUAN DI PLATFORM 1,2
LOKASI : STESEN LRT ${stesen} (KJL)

1. Lapor kawalan dan pemantauan di platform Stesen ${stesen} (KJL).
2. Pergerakan penumpang keluar/masuk tren lancar.
3. Perkhidmatan tren beroperasi seperti biasa.

ANGGOTA BERTUGAS :
${document.getElementById('anggota').value}

*#TERUSKAN PERKARA BAIK*`);

};

document.getElementById('sendLaporanPeak').onclick = ()=>{

hantar(`*Update Terkini :*

- Tarikh : ${getTarikh()}
- Stesen : ${document.getElementById('stesen').value.toUpperCase()}
- Masa : ${getMasa()}

Status : *${document.getElementById('komenPeak').value || 'BAIK & TERKAWAL'}*`);

};

document.getElementById('sendLaporanTamat').onclick = ()=>{

const stesen = document.getElementById('stesen').value.toUpperCase();

hantar(`*Assalamualaikum wbt & Salam Sejahtera Tuan/Puan,*

Laporan penugasan anggota bertugas Aliran Kelana Jaya Jabatan Sekuriti.

TARIKH : ${getTarikh()}
MASA : ${getMasa()}
TUGASAN : RONDAAN STESEN
LOKASI : STESEN LRT ${stesen} (KJL)

1. Rondaan dan pemantauan sekitar kawasan stesen selepas tamat operasi tren bagi STESEN LRT ${stesen} (KJL).
2. ⁠Kawasan concourse, kiosk, tandas, surau, bilik janitor, ER, CSO,tangga kecemasan dan platform.
3. ⁠SELESAI RONDAAN LOKASI BAIK,SERTA TIADA KELIBAT PENUMPANG DIDALAM STESEN DAN KEADAAN TERKAWAL .

ANGGOTA BERTUGAS :
${document.getElementById('anggota').value}

*#TERUSKAN PERKARA BAIK*`);

};

document.getElementById('sendLaporanCucian').onclick = ()=>{

hantar(`*Assalamualaikum wbt & Salam Sejahtera YDH Datuk/Tuan/Puan,*

Laporan penugasan anggota bertugas Aliran Kelana Jaya Jabatan Sekuriti.

TARIKH : ${getTarikh()}
MASA : ${getMasa()}
TUGASAN : PERIKSA KEMASUKAN KONTRAKTOR
LOKASI : STESEN LRT ${document.getElementById('stesen').value.toUpperCase()} (KJL)

1. Kehadiran ${document.getElementById('jumlahCucian').value} kontraktor pembersihan syarikat ${document.getElementById('syarikatCucian').value} tujuan kerja-kerja cucian stesen.
2. Semakan Pas Kontraktor serta Work Permit masih dalam tempoh sah laku.
3. Tiada sebarang penyamaran / perkara mencurigakan, sekian.

ANGGOTA BERTUGAS :
${document.getElementById('anggota').value}

*#Teruskan Perkara Baik*`);

};

document.getElementById('sendLaporanKontraktor').onclick = ()=>{

const stesen = document.getElementById('stesen').value.toUpperCase();
const jumlah = document.getElementById('jumlahKontraktor').value;
const syarikat = document.getElementById('syarikatKontraktor').value.toUpperCase();
const kerja = document.getElementById('kerjaKontraktor').value;
const pas = document.getElementById('jenisPas').value;
const pemantau = document.getElementById('stafPemantau').value.toUpperCase();

hantar(`*Assalamualaikum wbt & Salam Sejahtera Tuan/Puan,*

Laporan penugasan anggota bertugas Aliran Kelana Jaya Jabatan Sekuriti.

TARIKH : ${getTarikh()}
MASA : ${getMasa()}
TUGASAN : PEMERIKSAAN KEMASUKAN KONTRAKTOR
LOKASI : STESEN LRT ${stesen} (KJL)

1. Lapor kemasukan ${jumlah} kontraktor ${syarikat}.
2. Masuk membuat kerja-kerja ${kerja} stesen ${stesen}.
3. Kesemua kontraktor mempunyai Work Permit.
4. ${pas}.
5. Kesemua kontraktor dipantau oleh staff bertugas ${pemantau}.
6. Lokasi baik dan dalam kawalan.

ANGGOTA BERTUGAS :
${document.getElementById('anggota').value}

*#Teruskan Perkara Baik*`);

};

document.getElementById('resetStorage').onclick = ()=>{

if(confirm('Padam semua data?')){

localStorage.clear();
location.reload();

}

};

</script>
</body>
</html>
