<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan PB KJL ZON 3</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* Kesan Glassmorphism yang lebih diperhalusi */
  .glass {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.3);
  }

  /* Animasi berkelip untuk teks 'By NAZMI' */
  .blink-red {
    animation: blink 3s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; text-shadow: 0 0 5px rgba(239, 68, 68, 0.7); }
    50% { opacity: 0.5; text-shadow: none; }
  }

  /* Animasi nadi untuk Butang Reset agar menyerlah */
  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
    70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
  }
  .animate-pulse-red {
    animation: pulse-red 2s infinite;
  }

  /* Gaya seragam untuk semua input dan select apabila fokus */
  input:focus, select:focus, textarea:focus {
    --tw-ring-color: #3b82f6; /* Warna biru primer */
    outline: none;
    ring: 2px;
    border-color: #3b82f6;
  }
</style>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-gray-800 min-h-screen p-4 md:p-8 font-sans">

<div class="max-w-lg mx-auto space-y-8">
  
  <!-- Header Laporan -->
  <div class="text-center text-white pt-6 pb-2 border-b border-gray-700/50">
    <h2 class="text-3xl font-extrabold tracking-tight sm:text-4xl shadow-sm text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-300">
      FORMAT LAPORAN PENUGASAN
    </h2>
    <p class="text-lg font-semibold text-blue-400 mt-1">KJL ZON 3</p>
    <p class="text-xs italic blink-red mt-3 text-gray-400">By Detektif 👨‍✈️ NAZMI 👮🏿‍♂️🤣</p>
  </div>

  <!-- Kad Borang Utama (Glassmorphism) -->
  <div class="glass p-6 sm:p-8 rounded-3xl shadow-2xl space-y-6 border border-white/10">

    <!-- Komponen 1: Maklumat Asas -->
    <div class="space-y-4 border-b border-gray-200 pb-6">
      <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider flex items-center gap-2">
        <span>📍</span> Maklumat Penugasan
      </h3>
      
      <!-- STESEN DROPDOWN -->
      <div class="space-y-1.5">
        <label for="stesen" class="text-xs font-semibold text-gray-600 px-1">Pilih Stesen Hari Ini</label>
        <select id="stesen" class="w-full p-3.5 rounded-xl border border-gray-300 bg-white text-gray-800 shadow-sm transition-all focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
          <option value="">-- SILA PILIH STESEN --</option>
          <option value="ABDULLAH HUKUM">ABDULLAH HUKUM</option>
          <option value="KERINCHI">KERINCHI</option>
          <option value="UNIVERSITI">UNIVERSITI</option>
          <option value="TAMAN JAYA">TAMAN JAYA</option>
          <option value="ASIA JAYA">ASIA JAYA</option>
          <option value="TAMAN PARAMOUNT">TAMAN PARAMOUNT</option>
          <option value="TAMAN BAHAGIA">TAMAN BAHAGIA</option>
          <option value="KELANA JAYA">KELANA JAYA</option>
        </select>
      </div>

      <!-- ANGGOTA -->
      <div class="space-y-1.5">
        <label for="anggota" class="text-xs font-semibold text-gray-600 px-1">Nama Anggota Bertugas</label>
        <input 
          type="text" 
          id="anggota" 
          placeholder="Cth: L/Kpl Ali bin Abu" 
          class="w-full p-3.5 rounded-xl border border-gray-300 shadow-sm transition-all focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>
    </div>

    <!-- Komponen 2: Laporan Rutin & Khas -->
    <div class="space-y-6 pb-6 border-b border-gray-200">
      <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider flex items-center gap-2">
        <span>📋</span> Jenis Laporan
      </h3>

      <!-- LAPORAN BIASA -->
      <button 
        id="sendLaporanBiasa" 
        class="w-full bg-green-600 text-white p-4 rounded-xl font-bold hover:bg-green-700 active:bg-green-800 transition-colors shadow-lg flex items-center justify-center gap-2 text-lg">
        <span>✅</span> Laporan Biasa
      </button>

      <!-- BAHAGIAN PEAK HOUR (TEMA AMBER) -->
      <div class="space-y-3 p-4 rounded-2xl bg-amber-50 border border-amber-200 shadow-inner">
        <label for="komenPeak" class="text-xs font-semibold text-amber-900 px-1 flex items-center gap-1.5">
          <span>⚠️</span> Status Peak Hour / Krisis
        </label>
        <textarea 
          id="komenPeak" 
          placeholder="Nyatakan status jika ada kelewatan, gangguan, atau krisis. Jika tiada, biarkan kosong untuk 'BAIK & TERKAWAL'." 
          class="w-full p-3.5 rounded-xl border border-amber-300 bg-white placeholder-amber-700/50 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 h-24 text-sm text-amber-950 transition-all"></textarea>
        <button 
          id="sendLaporanPeak" 
          class="w-full bg-amber-500 text-amber-950 p-3.5 rounded-xl font-bold hover:bg-amber-600 active:bg-amber-700 transition-colors shadow-md flex items-center justify-center gap-2">
          <span>🕒</span> Hantar Laporan Peak Hour
        </button>
      </div>

      <!-- BAHAGIAN TAMAT OPERASI (TEMA INDIGO) -->
      <div class="space-y-3 p-4 rounded-2xl bg-indigo-50 border border-indigo-200 shadow-inner">
        <label for="laporanTambahanTamat" class="text-xs font-semibold text-indigo-900 px-1 flex items-center gap-1.5">
          <span>🏁</span> Tamat Operasi (Pilihan)
        </label>
        <input 
          type="text" 
          id="laporanTambahanTamat" 
          placeholder="Laporan tambahan jika ada (cth: lampu platform 1 mati)" 
          class="w-full p-3.5 rounded-xl border border-indigo-300 bg-white placeholder-indigo-700/50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm text-indigo-950 transition-all">
        <button 
          id="sendLaporanTamat" 
          class="w-full bg-indigo-600 text-white p-3.5 rounded-xl font-bold hover:bg-indigo-700 active:bg-indigo-800 transition-colors shadow-md flex items-center justify-center gap-2">
          <span>🔒</span> Hantar Tamat Operasi
        </button>
      </div>
    </div>

    <!-- Komponen 3: Kontraktor -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-6 border-b border-gray-200">
      
      <!-- KONTRAKTOR CUCIAN (TEMA BLUE) -->
      <div class="bg-blue-50/50 p-5 rounded-2xl border border-blue-100 space-y-3 shadow-sm">
        <p class="text-xs font-bold text-blue-900 uppercase tracking-wider flex items-center gap-1.5">
          <span>🧹</span> Kontraktor Cucian
        </p>
        <div class="grid grid-cols-1 gap-3">
          <input 
            type="text" 
            id="syarikatCucian" 
            placeholder="Nama Syarikat" 
            class="p-3 rounded-lg border border-gray-300 text-sm focus:ring-1 focus:ring-blue-400">
          <input 
            type="number" 
            id="jumlahCucian" 
            placeholder="Jumlah Orang" 
            class="p-3 rounded-lg border border-gray-300 text-sm focus:ring-1 focus:ring-blue-400">
        </div>
        <button 
          id="sendLaporanCucian" 
          class="w-full bg-cyan-600 text-white p-3 rounded-xl font-semibold hover:bg-cyan-700 active:bg-cyan-800 transition-colors shadow flex items-center justify-center gap-1.5 text-sm">
          <span>📤</span> Laporan Cucian
        </button>
      </div>

      <!-- KONTRAKTOR AM (TEMA ORANGE) -->
      <div class="bg-orange-50/50 p-5 rounded-2xl border border-orange-100 space-y-3 shadow-sm">
        <p class="text-xs font-bold text-orange-900 uppercase tracking-wider flex items-center gap-1.5">
          <span>🛠️</span> Kontraktor Am
        </p>
        <div class="grid grid-cols-2 gap-2">
          <input 
            type="number" 
            id="jumlahKontraktor" 
            placeholder="Jmlh Orang" 
            class="p-3 rounded-lg border border-gray-300 text-sm focus:ring-1 focus:ring-orange-400">
          <input 
            type="text" 
            id="syarikatKontraktor" 
            placeholder="Syarikat" 
            class="p-3 rounded-lg border border-gray-300 text-sm focus:ring-1 focus:ring-orange-400">
        </div>
        <input 
          type="text" 
          id="kerjaKontraktor" 
          placeholder="Jenis Kerja (cth: baik pulih lampu)" 
          class="w-full p-3 rounded-lg border border-gray-300 text-sm focus:ring-1 focus:ring-orange-400">
        <select id="jenisPas" class="w-full p-3 rounded-lg border border-gray-300 bg-white text-sm text-gray-800 focus:ring-1 focus:ring-orange-400">
          <option value="Mempunyai Pas Kontraktor">Mempunyai Pas Kontraktor</option>
          <option value="Diberikan pas kontraktor sementara sehingga kerja-kerja baik pulih siap sepenuhnya">Diberikan Pas Kontraktor Sementara</option>
        </select>
        <input 
          type="text" 
          id="stafPemantau" 
          placeholder="Nama Staf Pemantau" 
          class="w-full p-3 rounded-lg border border-gray-300 text-sm focus:ring-1 focus:ring-orange-400">
        <button 
          id="sendLaporanKontraktor" 
          class="w-full bg-orange-600 text-white p-3 rounded-xl font-semibold hover:bg-orange-700 active:bg-orange-800 transition-colors shadow flex items-center justify-center gap-1.5 text-sm">
          <span>📤</span> Laporan Kontraktor Am
        </button>
      </div>

    </div>

    <!-- Komponen 4: Tindakan Sistem (Reset) -->
    <div class="pt-4 text-center">
      <p class="text-xs text-gray-500 mb-3">Tindakan Bahaya: Gunakan dengan berhati-hati.</p>
      <button 
        id="resetStorage" 
        class="w-full max-w-xs mx-auto bg-red-600 text-white py-3.5 px-6 rounded-2xl font-extrabold hover:bg-red-700 active:bg-red-800 transition-all shadow-xl flex items-center justify-center gap-3 animate-pulse-red hover:animate-none transform hover:scale-105">
        <span class="text-xl">🚮</span>
        <span class="tracking-tight">PADAM SEMUA DATA & RESET</span>
      </button>
    </div>

  </div>

  <!-- Footer Kecil -->
  <div class="text-center text-gray-500 text-xs pb-6">
    Sistem Laporan Pantas v2.1 | Dibina untuk Jabatan Sekuriti Aliran Kelana Jaya
  </div>

</div>

<script>
// --- LOGIK JAVASCRIPT (Kekal Sama Seperti Asal) ---

const fields = [
  'stesen',
  'anggota',
  'komenPeak',
  'laporanTambahanTamat',
  'syarikatCucian',
  'jumlahCucian',
  'jumlahKontraktor',
  'syarikatKontraktor',
  'kerjaKontraktor',
  'jenisPas',
  'stafPemantau'
];

// Load data dari localStorage semasa halaman dimuatkan
fields.forEach(id=>{
  const element = document.getElementById(id);
  if (element) {
    element.value = localStorage.getItem(id) || (id === 'jenisPas' ? 'Mempunyai Pas Kontraktor' : '');
  }
});

// Simpan data ke localStorage setiap kali input berubah
fields.forEach(id=>{
  const element = document.getElementById(id);
  if (element) {
    const saveToStorage = e => localStorage.setItem(id, e.target.value);
    element.addEventListener('change', saveToStorage);
    element.addEventListener('input', saveToStorage);
  }
});

// Fungsi pembantu untuk Tarikh dan Masa
function getTarikh(){
  return new Date().toLocaleDateString('ms-MY', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function getMasa(){
  const now = new Date();
  return now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', hour12:false }).replace(':','') + 'HRS';
}

// Fungsi untuk membuka WhatsApp
function hantar(teks){
  window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(teks), "_blank");
}

// --- LOGIK BUTANG HANTAR ---

document.getElementById('sendLaporanBiasa').onclick = ()=>{
  const stesen = document.getElementById('stesen').value.toUpperCase();
  if(!stesen) { alert('Sila pilih Stesen terlebih dahulu.'); return; }

  hantar(`*Assalamualaikum wbt & Salam Sejahtera YDH Tuan,*

Laporan penugasan anggota bertugas Aliran Kelana Jaya Jabatan Sekuriti.

TARIKH : ${getTarikh()}
MASA : ${getMasa()}
TUGASAN : KAWALAN DAN PEMANTAUAN DI PLATFORM 1,2
LOKASI : STESEN LRT ${stesen} (KJL)

1. Lapor kawalan dan pemantauan di platform Stesen ${stesen} (KJL).
2. Pergerakan penumpang keluar/masuk tren lancar.
3. Perkhidmatan tren beroperasi seperti biasa.

ANGGOTA BERTUGAS :
${document.getElementById('anggota').value}

*#TERUSKAN PERKARA BAIK*`);
};

document.getElementById('sendLaporanPeak').onclick = ()=>{
  const stesen = document.getElementById('stesen').value.toUpperCase();
  if(!stesen) { alert('Sila pilih Stesen terlebih dahulu.'); return; }

  hantar(`*Update Terkini :*

- Tarikh : ${getTarikh()}
- Stesen : ${stesen}
- Masa : ${getMasa()}

Status : *${document.getElementById('komenPeak').value || 'BAIK & TERKAWAL'}*`);
};

document.getElementById('sendLaporanTamat').onclick = ()=>{
  const stesen = document.getElementById('stesen').value.toUpperCase();
  if(!stesen) { alert('Sila pilih Stesen terlebih dahulu.'); return; }
  const tambahan = document.getElementById('laporanTambahanTamat').value;

  let barisTambahan = '';
  if(tambahan.trim() !== '') {
    barisTambahan = `\n4. ${tambahan}`;
  }

  hantar(`*Assalamualaikum wbt & Salam Sejahtera YDH Tuan,*

Laporan penugasan anggota bertugas Aliran Kelana Jaya Jabatan Sekuriti.

TARIKH : ${getTarikh()}
MASA : ${getMasa()}
TUGASAN : RONDAAN STESEN
LOKASI : STESEN LRT ${stesen} (KJL)

1. Rondaan dan pemantauan sekitar kawasan stesen selepas tamat operasi tren bagi STESEN LRT ${stesen} (KJL).
2. ⁠Kawasan concourse, kiosk, tandas, surau, bilik janitor, ER, CSO,tangga kecemasan dan platform.
3. ⁠SELESAI RONDAAN LOKASI BAIK,SERTA TIADA KELIBAT PENUMPANG DIDALAM STESEN DAN KEADAAN TERKAWAL.${barisTambahan}

ANGGOTA BERTUGAS :
${document.getElementById('anggota').value}

*#TERUSKAN PERKARA BAIK*`);
};

document.getElementById('sendLaporanCucian').onclick = ()=>{
  const stesen = document.getElementById('stesen').value.toUpperCase();
  if(!stesen) { alert('Sila pilih Stesen terlebih dahulu.'); return; }

  hantar(`*Assalamualaikum wbt & Salam Sejahtera YDH Tuan,*

Laporan penugasan anggota bertugas Aliran Kelana Jaya Jabatan Sekuriti.

TARIKH : ${getTarikh()}
MASA : ${getMasa()}
TUGASAN : PERIKSA KEMASUKAN KONTRAKTOR
LOKASI : STESEN LRT ${stesen} (KJL)

1. Kehadiran ${document.getElementById('jumlahCucian').value} kontraktor pembersihan syarikat ${document.getElementById('syarikatCucian').value} tujuan kerja-kerja cucian stesen.
2. Semakan Pas Kontraktor serta Work Permit masih dalam tempoh sah laku.
3. Tiada sebarang penyamaran / perkara mencurigakan, sekian.

ANGGOTA BERTUGAS :
${document.getElementById('anggota').value}

*#Teruskan Perkara Baik*`);
};

document.getElementById('sendLaporanKontraktor').onclick = ()=>{
  const stesen = document.getElementById('stesen').value.toUpperCase();
  if(!stesen) { alert('Sila pilih Stesen terlebih dahulu.'); return; }
  const jumlah = document.getElementById('jumlahKontraktor').value;
  const syarikat = document.getElementById('syarikatKontraktor').value.toUpperCase();
  const kerja = document.getElementById('kerjaKontraktor').value;
  const pas = document.getElementById('jenisPas').value;
  const pemantau = document.getElementById('stafPemantau').value.toUpperCase();

  hantar(`*Assalamualaikum wbt & Salam Sejahtera Tuan/Puan,*

Laporan penugasan anggota bertugas Aliran Kelana Jaya Jabatan Sekuriti.

TARIKH : ${getTarikh()}
MASA : ${getMasa()}
TUGASAN : PEMERIKSAAN KEMASUKAN KONTRAKTOR
LOKASI : STESEN LRT ${stesen} (KJL)

1. Lapor kemasukan ${jumlah} kontraktor ${syarikat}.
2. Masuk membuat kerja-kerja ${kerja} stesen ${stesen}.
3. Kesemua kontraktor mempunyai Work Permit.
4. ${pas}.
5. Kesemua kontraktor dipantau oleh staff bertugas ${pemantau}.
6. Lokasi baik dan dalam kawalan.

ANGGOTA BERTUGAS :
${document.getElementById('anggota').value}

*#Teruskan Perkara Baik*`);
};

// --- LOGIK BUTANG RESET ---

document.getElementById('resetStorage').onclick = ()=>{
  // Menggunakan confirm yang lebih mesra pengguna (walaupun standard pelayar)
  if(confirm('⚠️ PERINGATAN: Adakah anda pasti untuk memadam SEMUA data yang telah diisi dalam borang ini? Tindakan ini tidak boleh diundur.')){
    localStorage.clear();
    // Menambah kesan visual sedikit sebelum reload
    document.querySelector('.glass').style.opacity = '0.5';
    setTimeout(() => location.reload(), 300);
  }
};

</script>
</body>
</html>
